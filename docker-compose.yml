services:
  app:
    platform: linux/amd64
    image: nataliaemelianova/devops-for-developers-project-74
    build:
      context: .
      dockerfile: Dockerfile.production
    working_dir: /app
    command: make test
    pull_policy: build

    environment:
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    pull_policy: build

    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    # NOTE: ensure initdb runs with correct POSTGRES_* values
    # (for CI we rely on a fresh volume, so DB roles are created)

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  caddy_data:
  caddy_config: