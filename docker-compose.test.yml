services:
  app-test:
    build:
      context: .
      target: test
    environment:
      NODE_ENV: test
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: test_db
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx sequelize-cli db:migrate && npm test"
    networks:
      - test-network

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
